<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light only">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGNAL FEED</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { color-scheme: light only; background: #ffffff; }

  body {
    background: #f5f5f0 !important;
    color: #000000;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .sticky-top {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #ffffff;
    border-bottom: 1px solid #e2e2dc;
  }

  .header-inner {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    padding: 0 20px;
  }

  .wordmark {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    letter-spacing: 0.04em;
    color: #000000;
  }

  .updated {
    font-size: 12px;
    color: #999999;
    font-weight: 300;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .live-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #4caf78;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .filter-bar {
    border-top: 1px solid #f0f0eb;
    padding: 0 20px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-inner {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    gap: 6px;
    padding: 9px 0;
    white-space: nowrap;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid #d8d8d2;
    background: #f5f5f0;
    font-size: 12px;
    font-weight: 500;
    color: #666666;
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
    letter-spacing: 0.02em;
  }
  .pill:hover { border-color: #aaaaaa; color: #000000; }
  .pill.active { background: #000000; border-color: #000000; color: #ffffff; }

  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }

  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #999999;
    margin: 32px 0 0;
    padding-bottom: 8px;
    border-bottom: 1px solid #e2e2dc;
  }

  .section > .section-label:first-child { margin-top: 0; }

  .article {
    padding: 13px 0;
    border-bottom: 1px solid #ebebeb;
    display: block;
    text-decoration: none;
    color: #000000;
  }
  .article:last-child { border-bottom: none; }

  .article-title {
    font-size: 15px;
    font-weight: 400;
    color: #000000 !important;
    line-height: 1.45;
    margin-bottom: 5px;
  }
  .article:hover .article-title {
    text-decoration: underline;
    text-decoration-color: #cccccc;
    text-underline-offset: 3px;
  }

  .article-meta {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: #999999;
    font-weight: 300;
  }
  .source-name { font-weight: 500; color: #555555; }
  .sep { width: 2px; height: 2px; background: #cccccc; border-radius: 50%; flex-shrink: 0; }
  .signal-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .sig-high { background: #4caf78; }
  .sig-mid  { background: #e8a838; }

  .person-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 0;
    border-bottom: 1px solid #ebebeb;
    text-decoration: none;
    color: #000000;
  }
  .person-row:last-child { border-bottom: none; }
  .person-row:hover .person-name { color: #555555; }

  .person-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #efefea;
    border: 1px solid #e2e2dc;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
    color: #555555;
  }

  .person-info { flex: 1; min-width: 0; }
  .person-name {
    font-size: 14px;
    font-weight: 500;
    color: #000000;
    margin-bottom: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.15s ease;
  }
  .person-handle { font-size: 12px; color: #999999; font-weight: 300; }

  .person-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: #f5f5f0;
    border: 1px solid #d8d8d2;
    color: #888888;
    flex-shrink: 0;
    letter-spacing: 0.04em;
  }
  .person-tag.core { background: #000000; border-color: #000000; color: #ffffff; }

  footer {
    text-align: center;
    font-size: 11px;
    color: #bbbbbb;
    padding: 20px;
    border-top: 1px solid #e2e2dc;
    background: #ffffff;
    letter-spacing: 0.04em;
  }

  @media (max-width: 480px) {
    .header-inner { height: 46px; }
    .wordmark { font-size: 16px; }
    main { padding: 20px 16px 80px; }
    .article-title { font-size: 14px; }
  }
</style>
</head>
<body>

<div class="sticky-top">
  <div class="header-inner">
    <div class="wordmark">Signal Feed</div>
    <div class="updated" id="updated-time">
      <span class="live-dot"></span>
      <span id="updated-label">Loading...</span>
    </div>
  </div>
  <div class="filter-bar">
    <div class="filter-inner">
      <div class="pill active" onclick="filter('all',this)">All</div>
      <div class="pill" onclick="filter('ai',this)">AI &amp; Builders</div>
      <div class="pill" onclick="filter('platforms',this)">Platforms</div>
      <div class="pill" onclick="filter('business',this)">Small Business</div>
      <div class="pill" onclick="filter('bitcoin',this)">Bitcoin</div>
      <div class="pill" onclick="filter('people',this)">People</div>
    </div>
  </div>
</div>

<main id="feed-container">
  <div style="text-align:center;padding:60px 20px;color:#999999;font-size:14px;font-weight:300;">
    Loading feed...
  </div>
</main>

<footer>
  Signal Feed &nbsp;·&nbsp; Powered by Hermes &nbsp;·&nbsp; joneslab.dev
</footer>

<script>
// People Worth Watching — pulled from Notion source list
const PEOPLE = [
  { handle: 'Teknium',        name: 'Teknium',               org: 'Nous Research',        status: 'core' },
  { handle: 'labenz',         name: 'Nathan Labenz',         org: 'Cognitive Revolution', status: 'core' },
  { handle: 'stephsmithio',   name: 'Steph Smith',           org: 'Nvidia',               status: 'core' },
  { handle: 'shannholmberg',  name: 'Shann Holmberg',        org: 'AI / Builder',         status: 'watch' },
  { handle: 'PeterDiamandis', name: 'Peter Diamandis',       org: 'XPRIZE / Moonshots',   status: 'watch' },
  { handle: 'EMostaque',      name: 'Emad Mostaque',         org: 'Stability AI',         status: 'watch' },
  { handle: 'DaveBlundin',    name: 'Dave Blundin',          org: 'Link Ventures',        status: 'watch' },
  { handle: 'alexwg',         name: 'Alex Wissner-Gross',    org: 'MIT / Moonshots',      status: 'watch' },
  { handle: 'andrewdfeldman', name: 'Andrew Feldman',        org: 'Cerebras Systems',     status: 'watch' },
  { handle: 'Will4Planet',    name: 'Will Marshall',         org: 'Planet Labs',          status: 'watch' },
  { handle: 'chamath',        name: 'Chamath Palihapitiya',  org: 'All-In Pod',           status: 'watch' },
  { handle: 'jason',          name: 'Jason Calacanis',       org: 'All-In Pod',           status: 'watch' },
  { handle: 'mhp_guy',        name: 'Chris Koerner',         org: 'The Koerner Office',   status: 'watch' },
  { handle: 'thesamparr',     name: 'Sam Parr',              org: 'My First Million',     status: 'watch' },
  { handle: 'ShaanVP',        name: 'Shaan Puri',            org: 'My First Million',     status: 'watch' },
  { handle: 'MohnishPabrai',  name: 'Mohnish Pabrai',        org: 'Pabrai Funds',         status: 'watch' },
  { handle: 'jaeden_ai',      name: 'Jaeden Schafer',        org: 'AI Hustle',            status: 'watch' },
  { handle: 'conorgrennan',   name: 'Conor Grennan',         org: 'AI Mindset',           status: 'watch' },
  { handle: 'adamcurry',      name: 'Adam Curry',            org: 'Podcasting 2.0',       status: 'watch' },
];

// Map signal-feed.json categories → filter pill keys
const CAT_MAP = {
  'AI BUILDERS':   'ai',
  'PLATFORM NEWS': 'platforms',
  'SMALL BUSINESS':'business',
  'WORKFLOWS':     'business',
  'BITCOIN':       'bitcoin',
};

function filter(cat, el) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.section').forEach(s => {
    s.style.display = (cat === 'all' || s.dataset.cat === cat) ? 'block' : 'none';
  });
}

function signalClass(score) {
  if (!score) return 'sig-mid';
  return score >= 7 ? 'sig-high' : 'sig-mid';
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildPeopleSection() {
  const core  = PEOPLE.filter(p => p.status === 'core');
  const watch = PEOPLE.filter(p => p.status === 'watch');
  const rows = [...core, ...watch].map(p => `
    <a class="person-row" href="https://x.com/${p.handle}" target="_blank">
      <div class="person-avatar">${p.name.charAt(0)}</div>
      <div class="person-info">
        <div class="person-name">${esc(p.name)}</div>
        <div class="person-handle">@${esc(p.handle)} · ${esc(p.org)}</div>
      </div>
      <div class="person-tag ${p.status === 'core' ? 'core' : ''}">${p.status === 'core' ? 'Core' : 'Watch'}</div>
    </a>`).join('');
  return `<div class="section" data-cat="people">
    <div class="section-label">People Worth Watching</div>
    ${rows}
  </div>`;
}

async function loadFeed() {
  try {
    const res = await fetch('signal-feed.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    // Header: show most recent day label
    const days = data.days || [];
    if (days.length && days[0].date) {
      document.getElementById('updated-label').textContent = days[0].date;
    }

    // Bucket items by category across all days
    const buckets = {
      ai:        { label: 'AI &amp; Builders',       articles: [] },
      platforms: { label: 'Platform News',            articles: [] },
      business:  { label: 'Small Business',           articles: [] },
      bitcoin:   { label: 'Bitcoin',                  articles: [] },
    };

    days.forEach(day => {
      (day.items || []).forEach(item => {
        const cat = CAT_MAP[item.category] || 'ai';
        if (buckets[cat]) {
          buckets[cat].articles.push({
            title:    item.headline,
            url:      item.url,
            source:   item.source,
            score:    item.score,
            day_date: day.date,
          });
        }
      });
    });

    let html = '';
    for (const [cat, { label, articles }] of Object.entries(buckets)) {
      if (!articles.length) continue;
      const rows = articles.map(a => `
        <a class="article" href="${esc(a.url)}" target="_blank">
          <div class="article-title">${esc(a.title)}</div>
          <div class="article-meta">
            <span class="signal-dot ${signalClass(a.score)}"></span>
            <span class="source-name">${esc(a.source)}</span>
            <span class="sep"></span>
            <span>${esc(a.day_date)}</span>
          </div>
        </a>`).join('');
      html += `<div class="section" data-cat="${cat}">
        <div class="section-label">${label}</div>
        ${rows}
      </div>`;
    }

    html += buildPeopleSection();
    document.getElementById('feed-container').innerHTML = html;

  } catch(e) {
    document.getElementById('feed-container').innerHTML =
      '<div style="text-align:center;padding:60px 20px;color:#999;font-size:14px;font-weight:300;">Feed unavailable — check back soon.</div>';
    console.error('Feed load error:', e);
  }
}

loadFeed();
</script>

</body>
</html>
